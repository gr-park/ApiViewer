<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Viewer — URL 분석</title>
  <style>
    :root {
      --bg: #f4f6f9; --card: #ffffff; --primary: #3b82f6; --primary-hover: #2563eb;
      --danger: #ef4444; --success: #22c55e; --purple: #8b5cf6;
      --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
      --shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

    .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); }
    .header h1 { font-size: 18px; font-weight: 700; color: var(--primary); }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .tag { font-size: 11px; background: #ede9fe; color: #5b21b6; padding: 3px 8px; border-radius: 4px; font-weight: 600; }

    .main { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .card-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .card-title .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-blue { background: var(--primary); }
    .dot-purple { background: var(--purple); }
    .dot-green { background: var(--success); }
    .dot-red { background: var(--danger); }

    .config-grid { display: grid; grid-template-columns: 2fr 1fr 1.2fr 0.8fr 0.8fr; gap: 10px; }
    .config-grid-w { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1.5fr; gap: 10px; }
    .config-row2 { display: grid; grid-template-columns: 2fr auto; gap: 10px; margin-top: 10px; align-items: end; }
    .config-row3 { display: grid; grid-template-columns: 1.5fr 1.5fr auto; gap: 10px; margin-top: 10px; align-items: end; }
    label.field { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--text-muted); font-weight: 600; }
    label.field input, label.field select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; outline: none; transition: border .15s; background: var(--card); }
    label.field input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px #3b82f620; }
    label.field input.purple:focus { border-color: var(--purple); box-shadow: 0 0 0 2px #8b5cf620; }

    .toggle-arrow { font-size: 12px; color: var(--text-muted); transition: transform .2s; }
    .toggle-arrow.open { transform: rotate(180deg); }

    .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s, opacity .15s; white-space: nowrap; height: 34px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-blue { background: var(--primary); color: #fff; }
    .btn-blue:not(:disabled):hover { background: var(--primary-hover); }
    .btn-purple { background: var(--purple); color: #fff; }
    .btn-purple:not(:disabled):hover { background: #7c3aed; }
    .btn-ghost { background: #f1f5f9; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:not(:disabled):hover { background: #e2e8f0; }
    .nav-link { font-size:12px; color:var(--text-muted); font-weight:600; text-decoration:none; padding:6px 12px; border:1px solid var(--border); border-radius:6px; }
    .nav-link:hover { background:#f1f5f9; }
    .nav-active { color:var(--primary) !important; border-color:var(--primary) !important; }

    .progress-bar-w { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; display: none; }
    .progress-fill-w { height: 100%; background: var(--purple); border-radius: 2px; animation: prog 2s ease-in-out infinite; }
    @keyframes prog { 0%{width:0;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0;margin-left:100%} }

    .toast { position: fixed; bottom: 24px; right: 24px; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; color: #fff; z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--danger); }
    .toast.success { background: var(--success); }
    .toast.info { background: var(--purple); }

    .all-repo-info { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 12px 16px; font-size: 12px; color: #1e40af; }
    .all-repo-info strong { display: block; font-size: 13px; margin-bottom: 4px; }

    /* ── 추출 진행 카드 ── */
    .progress-card { display: none; }
    .progress-card.show { display: block; }
    .prog-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .prog-header .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .prog-header .prog-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .prog-header .prog-status { font-size: 12px; color: var(--text-muted); margin-left: auto; }
    .prog-repo-label { font-size: 12px; font-weight: 600; color: var(--primary); background: #eff6ff; border-radius: 6px; padding: 5px 10px; margin-bottom: 10px; display: none; }
    .prog-bar-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .prog-track { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
    .prog-track-fill { height: 100%; background: var(--primary); border-radius: 5px; transition: width .4s ease; width: 0%; }
    .prog-pct { font-size: 18px; font-weight: 800; color: var(--primary); min-width: 50px; text-align: right; }
    .prog-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
    .prog-file { font-size: 11px; color: var(--text-muted); background: var(--bg); border-radius: 6px; padding: 5px 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'Consolas', monospace; }

    /* ── 결과 요약 ── */
    .result-summary { display: none; margin-top: 14px; padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; }
    .result-summary.show { display: flex; align-items: center; gap: 10px; }
    .result-summary.ok { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .result-summary.fail { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .result-summary .result-actions { margin-left: auto; display: flex; gap: 8px; }
    .result-summary .result-actions a { font-size: 12px; padding: 4px 12px; border-radius: 6px; text-decoration: none; font-weight: 600; }
    .link-viewer { background: var(--primary); color: #fff !important; }
    .link-viewer:hover { background: var(--primary-hover); }

    /* ── 로그 패널 ── */
    .log-card { display: none; }
    .log-card.show { display: block; }
    .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .log-header .card-title { margin-bottom: 0; }
    .log-counts { display: flex; gap: 10px; font-size: 11px; font-weight: 600; }
    .log-counts .cnt-ok { color: var(--success); }
    .log-counts .cnt-warn { color: #d97706; }
    .log-counts .cnt-err { color: var(--danger); }
    .log-wrap { background: #0f172a; border-radius: 8px; padding: 0; max-height: 400px; overflow-y: auto; font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; line-height: 1.7; }
    .log-line { padding: 3px 14px; border-bottom: 1px solid #1e293b; display: flex; gap: 8px; }
    .log-line:last-child { border-bottom: none; }
    .log-ts { color: #64748b; min-width: 64px; flex-shrink: 0; }
    .log-tag { min-width: 50px; flex-shrink: 0; font-weight: 700; }
    .log-tag.t-INFO { color: #60a5fa; }
    .log-tag.t-OK   { color: #4ade80; }
    .log-tag.t-WARN { color: #fbbf24; }
    .log-tag.t-ERROR{ color: #f87171; }
    .log-msg { color: #e2e8f0; word-break: break-all; }
    .log-msg.m-ERROR { color: #fca5a5; }
    .log-msg.m-WARN  { color: #fde68a; }
    .log-empty { color: #475569; padding: 20px; text-align: center; }
  </style>
</head>
<body>

<script>
(async function guard() {
  if (sessionStorage.getItem('isAdmin') === 'true') return;
  const pw = prompt('관리자 비밀번호를 입력하세요:');
  if (!pw) { location.href = '/'; return; }
  try {
    const res = await fetch('/api/verify-password', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw}) });
    const d = await res.json();
    if (d.valid) { sessionStorage.setItem('isAdmin','true'); sessionStorage.setItem('adminToken',d.token); }
    else { alert('비밀번호가 일치하지 않습니다.'); location.href = '/'; }
  } catch(e) { alert('인증 실패'); location.href = '/'; }
})();
</script>
<div class="header">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
  </svg>
  <h1>URL Viewer</h1>
  <div class="header-right">
    <a href="/"             class="nav-link">📊 대시보드</a>
    <a href="/extract.html" class="nav-link nav-active">🔍 URL 분석</a>
    <a href="/viewer.html"  class="nav-link">📋 이력 조회</a>
    <a href="/review.html" class="nav-link">📝 현업 검토</a>
    <a href="/settings.html" class="nav-link">⚙️ 설정</a>
  </div>
</div>

<div class="main">

  <!-- ─── API 추출 설정 ─── -->
  <div class="card">
    <div class="card-title">
      <span class="dot dot-blue"></span>URL 분석 설정
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <span style="font-size:11px;color:var(--text-muted);font-weight:400;">레포지토리 선택</span>
        <select id="repoConfigSelect" onchange="onRepoSelect()" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none;background:var(--card);min-width:180px;">
          <option value="">-- 선택 --</option>
          <option value="all">🔄 전체 레포 추출</option>
        </select>
      </div>
    </div>

    <!-- 전체 추출 안내 -->
    <div id="allRepoInfo" style="display:none;" class="all-repo-info">
      <strong>전체 레포지토리 순차 추출</strong>
      설정된 모든 레포지토리를 순서대로 추출합니다.
    </div>

    <!-- 개별 레포 입력 폼 -->
    <div id="singleRepoForm">
      <div class="config-grid">
        <label class="field">소스 경로 (ROOT_PATH) *
          <input id="rootPath" type="text" placeholder="/Users/.../my-project/src/main/java" oninput="autoFillRepoName()">
        </label>
        <label class="field">레포지토리명 (DB 저장 키)
          <input id="repositoryName" type="text" placeholder="my-project">
        </label>
        <label class="field">도메인 (DOMAIN)
          <input id="domain" type="text" placeholder="https://api.example.com">
        </label>
        <label class="field">URL 경로 프리픽스
          <input id="apiPathPrefix" type="text" placeholder="/APP">
        </label>
        <label class="field">Git 실행 경로
          <input id="gitBinPath" type="text" placeholder="git">
        </label>
      </div>
      <div class="config-row2">
        <label class="field">상수 치환 (PATH_CONSTANTS)
          <input id="pathConstants" type="text" placeholder="Constants.BASE=/v1, ApiConst.ROOT=/api/v2">
        </label>
        <button class="btn btn-blue" id="extractBtn" onclick="doExtract()">추출 시작</button>
      </div>
    </div>

    <!-- 전체 추출 버튼 -->
    <div id="allRepoBtn" style="display:none;margin-top:12px;text-align:right;">
      <button class="btn btn-blue" id="extractAllBtn" onclick="doExtract()">전체 추출 시작</button>
    </div>
  </div>

  <!-- ─── 추출 진행 상황 ─── -->
  <div class="card progress-card" id="progressCard">
    <div class="prog-header">
      <div class="spinner" id="progSpinner"></div>
      <span class="prog-title" id="progTitle">추출 진행 중</span>
      <span class="prog-status" id="progStatus"></span>
    </div>
    <div class="prog-repo-label" id="progRepoLabel"></div>
    <div class="prog-bar-wrap">
      <div class="prog-track">
        <div class="prog-track-fill" id="progFill"></div>
      </div>
      <span class="prog-pct" id="progPct">0%</span>
    </div>
    <div class="prog-info">
      <span id="progCount">파일 탐색 중...</span>
      <span id="progFile" class="prog-file" style="max-width:400px;"></span>
    </div>

    <!-- 결과 요약 -->
    <div class="result-summary" id="resultSummary">
      <span id="resultMsg"></span>
      <div class="result-actions" id="resultActions"></div>
    </div>
  </div>

  <!-- ─── 추출 로그 ─── -->
  <div class="card log-card" id="logCard">
    <div class="log-header">
      <div class="card-title" style="margin-bottom:0;">
        <span class="dot dot-green"></span>추출 로그
      </div>
      <div class="log-counts" id="logCounts"></div>
    </div>
    <div class="log-wrap" id="logWrap">
      <div class="log-empty">추출이 시작되면 로그가 여기에 표시됩니다.</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let allRepos = [];
  let lastLogCount = 0;

  // ── 레포 설정 목록 로드 ───────────────────────────────────
  async function initRepoConfigs() {
    try {
      const res = await fetch('/api/config/repos');
      allRepos = await res.json();
      const sel = document.getElementById('repoConfigSelect');
      allRepos.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = r.businessName ? `${r.repoName} | ${r.businessName}` : r.repoName;
        sel.appendChild(opt);
      });
    } catch(e) {}
  }

  function onRepoSelect() {
    const val = document.getElementById('repoConfigSelect').value;
    const isAll = val === 'all';
    document.getElementById('allRepoInfo').style.display  = isAll ? 'block' : 'none';
    document.getElementById('singleRepoForm').style.display = isAll ? 'none' : 'block';
    document.getElementById('allRepoBtn').style.display   = isAll ? 'block' : 'none';
    if (!isAll && val) loadRepoConfig(val);
  }

  async function loadRepoConfig(id) {
    if (!id) return;
    try {
      const res = await fetch(`/api/config/repos/${id}`);
      const r = await res.json();

      document.getElementById('rootPath').value       = r.rootPath       || '';
      document.getElementById('repositoryName').value = r.repoName       || '';
      document.getElementById('domain').value         = r.domain         || '';
      document.getElementById('apiPathPrefix').value  = r.apiPathPrefix  || '';
      document.getElementById('gitBinPath').value     = r.gitBinPath     || '';
      document.getElementById('pathConstants').value  = r.pathConstants  || '';

      showToast(`"${r.repoName}" 설정을 불러왔습니다.`, 'info');
    } catch(e) { showToast('설정 불러오기 실패', 'error'); }
  }


  // ── API 추출 ─────────────────────────────────────────────
  let progressTimer = null;

  async function doExtract() {
    const selVal = document.getElementById('repoConfigSelect').value;

    // 초기화
    lastLogCount = 0;
    showProgressCard(true);
    showLogCard(true);
    clearLogs();
    hideResult();

    if (selVal === 'all') {
      const repos = allRepos.filter(r => r.rootPath);
      if (repos.length === 0) { showToast('추출할 레포지토리가 없습니다.', 'error'); return; }

      setExtracting(true);
      addLocalLog('INFO', `전체 추출 시작 — ${repos.length}개 레포지토리`);
      let totalSaved = 0;
      let errorCount = 0;

      for (let i = 0; i < repos.length; i++) {
        const r = repos[i];
        setRepoLabel(`레포 ${i+1}/${repos.length}: ${r.repoName}`);
        addLocalLog('INFO', `── ${r.repoName} 추출 시작 ──`);
        try {
          const result = await extractOneRepo(r.rootPath, r.repoName, r.domain || '', r.apiPathPrefix || '', r.gitBinPath || 'git', r.pathConstants || '');
          if (result.savedCount >= 0) totalSaved += result.savedCount;
        } catch(e) {
          addLocalLog('ERROR', `${r.repoName} 추출 실패: ${e.message}`);
          errorCount++;
        }
      }

      setExtracting(false);
      setRepoLabel('');
      if (errorCount > 0) {
        showResult('fail', `전체 추출 완료 — 성공 ${repos.length - errorCount}개, 실패 ${errorCount}개, 총 ${totalSaved}개 저장`);
      } else {
        showResult('ok', `전체 추출 완료 — ${repos.length}개 레포, 총 ${totalSaved}개 URL 저장`);
      }
      addLocalLog('INFO', `전체 추출 종료`);

    } else {
      const rootPath = document.getElementById('rootPath').value.trim();
      if (!rootPath) { showToast('소스 경로를 입력하세요.', 'error'); return; }

      setExtracting(true);
      const repoName = document.getElementById('repositoryName').value.trim();

      try {
        const result = await extractOneRepo(
          rootPath, repoName,
          document.getElementById('domain').value.trim(),
          document.getElementById('apiPathPrefix').value.trim(),
          document.getElementById('gitBinPath').value.trim(),
          document.getElementById('pathConstants').value.trim()
        );
        if (result.error) {
          showResult('fail', `추출 오류: ${result.error}`);
        } else {
          const msg = result.savedCount >= 0
            ? `추출 완료 — ${result.savedCount}개 URL 저장`
            : `추출 완료`;
          showResult('ok', msg);
        }
      } catch(e) {
        showResult('fail', `추출 오류: ${e.message}`);
        addLocalLog('ERROR', e.message);
      }

      setExtracting(false);
    }
  }

  function extractOneRepo(rootPath, repositoryName, domain, apiPathPrefix, gitBinPath, pathConstants) {
    return new Promise(async (resolve, reject) => {
      try {
        const res = await fetch('/api/extract', {
          method: 'POST',
          headers: {'Content-Type':'application/json', 'X-Admin-Token': sessionStorage.getItem('adminToken')||''},
          body: JSON.stringify({ rootPath, repositoryName, domain, apiPathPrefix, gitBinPath, pathConstants })
        });
        const data = await res.json();
        if (!res.ok) { reject(new Error(data.error || '서버 오류')); return; }

        progressTimer = setInterval(async () => {
          try {
            const p = await (await fetch('/api/progress')).json();
            updateProgress(p);

            if (!p.extracting) {
              clearInterval(progressTimer); progressTimer = null;
              updateProgress(p); // 마지막 로그 반영
              resolve({ savedCount: p.savedCount, error: p.error });
            }
          } catch(e) {
            clearInterval(progressTimer); progressTimer = null;
            reject(e);
          }
        }, 500);
      } catch(e) { reject(e); }
    });
  }

  // ── 진행상황 업데이트 ─────────────────────────────────────
  function updateProgress(p) {
    const pct = p.percent || 0;
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progPct').textContent = pct + '%';
    document.getElementById('progFile').textContent = p.currentFile || '';

    if (p.total > 0) {
      document.getElementById('progCount').textContent = `${p.processed} / ${p.total} 파일`;
      document.getElementById('progStatus').textContent = p.extracting ? '분석 중...' : '완료';
    } else {
      document.getElementById('progCount').textContent = '파일 탐색 중...';
    }

    // 서버 로그 동기화
    const logs = p.logs || [];
    if (logs.length > lastLogCount) {
      const newLogs = logs.slice(lastLogCount);
      newLogs.forEach(line => appendLogLine(line));
      lastLogCount = logs.length;
    }
  }

  // ── 로그 패널 ──────────────────────────────────────────────
  function clearLogs() {
    document.getElementById('logWrap').innerHTML = '';
    document.getElementById('logCounts').innerHTML = '';
    lastLogCount = 0;
  }

  function addLocalLog(level, msg) {
    const ts = new Date().toTimeString().substring(0, 8);
    appendLogLine(`${ts} [${level}] ${msg}`);
  }

  function appendLogLine(raw) {
    const wrap = document.getElementById('logWrap');
    // 빈 안내문 제거
    const empty = wrap.querySelector('.log-empty');
    if (empty) empty.remove();

    // 파싱: "HH:MM:SS [LEVEL] message"
    const m = raw.match(/^(\d{2}:\d{2}:\d{2})\s+\[(\w+)]\s+(.*)$/);
    const ts    = m ? m[1] : '';
    const level = m ? m[2] : 'INFO';
    const msg   = m ? m[3] : raw;

    const div = document.createElement('div');
    div.className = 'log-line';
    div.innerHTML =
      `<span class="log-ts">${esc(ts)}</span>` +
      `<span class="log-tag t-${level}">${level}</span>` +
      `<span class="log-msg m-${level}">${esc(msg)}</span>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;

    updateLogCounts();
  }

  function updateLogCounts() {
    const lines = document.querySelectorAll('.log-line');
    let ok = 0, warn = 0, err = 0;
    lines.forEach(l => {
      const tag = l.querySelector('.log-tag');
      if (!tag) return;
      if (tag.classList.contains('t-OK'))    ok++;
      if (tag.classList.contains('t-WARN'))  warn++;
      if (tag.classList.contains('t-ERROR')) err++;
    });
    const parts = [];
    if (ok)   parts.push(`<span class="cnt-ok">OK ${ok}</span>`);
    if (warn) parts.push(`<span class="cnt-warn">WARN ${warn}</span>`);
    if (err)  parts.push(`<span class="cnt-err">ERROR ${err}</span>`);
    document.getElementById('logCounts').innerHTML = parts.join('');
  }

  // ── 진행 카드 UI ──────────────────────────────────────────
  function showProgressCard(v) {
    document.getElementById('progressCard').classList.toggle('show', v);
    if (v) {
      document.getElementById('progSpinner').style.display = 'inline-block';
      document.getElementById('progTitle').textContent = '추출 진행 중';
      document.getElementById('progFill').style.width = '0%';
      document.getElementById('progPct').textContent = '0%';
      document.getElementById('progCount').textContent = '준비 중...';
      document.getElementById('progFile').textContent = '';
      document.getElementById('progStatus').textContent = '';
    }
  }

  function showLogCard(v) {
    document.getElementById('logCard').classList.toggle('show', v);
  }

  function setRepoLabel(text) {
    const el = document.getElementById('progRepoLabel');
    if (text) { el.textContent = text; el.style.display = 'block'; }
    else { el.style.display = 'none'; }
  }

  function showResult(type, msg) {
    const el = document.getElementById('resultSummary');
    el.className = `result-summary show ${type}`;
    document.getElementById('resultMsg').textContent = msg;

    // 완료 시 스피너 숨기고 제목 변경
    document.getElementById('progSpinner').style.display = 'none';
    document.getElementById('progTitle').textContent = type === 'ok' ? '추출 완료' : '추출 완료 (오류 있음)';
    document.getElementById('progStatus').textContent = '';

    // 조회 링크
    const actions = document.getElementById('resultActions');
    const repoName = document.getElementById('repositoryName').value.trim();
    const selVal = document.getElementById('repoConfigSelect').value;
    const viewerUrl = (selVal === 'all' || !repoName)
      ? '/viewer.html'
      : `/viewer.html?repo=${encodeURIComponent(repoName)}`;
    actions.innerHTML = `<a class="link-viewer" href="${viewerUrl}">이력 조회 →</a>`;
  }

  function hideResult() {
    document.getElementById('resultSummary').className = 'result-summary';
  }

  // ── UI 헬퍼 ──────────────────────────────────────────────
  function setExtracting(v) {
    const b1 = document.getElementById('extractBtn');
    const b2 = document.getElementById('extractAllBtn');
    if (b1) { b1.disabled = v; b1.textContent = v ? '추출 중...' : '추출 시작'; }
    if (b2) { b2.disabled = v; b2.textContent = v ? '추출 중...' : '전체 추출 시작'; }
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function autoFillRepoName() {
    const repoInput = document.getElementById('repositoryName');
    if (repoInput.value.trim()) return;
    const path = document.getElementById('rootPath').value.trim();
    if (!path) return;
    const parts = path.replace(/\\/g, '/').split('/').filter(Boolean);
    const skip = new Set(['src', 'main', 'java', 'kotlin']);
    for (let i = parts.length - 1; i >= 0; i--) {
      if (!skip.has(parts[i].toLowerCase())) { repoInput.value = parts[i]; break; }
    }
  }


  initRepoConfigs();

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.closest('.card')) {
      doExtract();
    }
  });
</script>
</body>
</html>
