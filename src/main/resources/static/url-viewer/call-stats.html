<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Viewer — URL호출현황</title>
  <style>
    :root {
      --bg:#f4f6f9; --card:#fff; --primary:#3b82f6; --primary-hover:#2563eb;
      --danger:#ef4444; --success:#22c55e; --purple:#8b5cf6; --warning:#f59e0b;
      --text:#1e293b; --text-muted:#64748b; --border:#e2e8f0;
      --shadow:0 1px 4px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
    .header{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
    .header h1{font-size:18px;font-weight:700;color:var(--primary);}
    .header a:has(h1){color:inherit;text-decoration:none;}
    .header a:has(h1):hover h1{opacity:.75;}
    .header a:has(h1) h1{transition:opacity .15s;}
    .header-sub{font-size:12px;color:var(--text-muted);background:#f1f5f9;padding:3px 10px;border-radius:4px;font-weight:600;}
    .header-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
    .nav-link{font-size:12px;color:var(--text-muted);font-weight:600;text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:6px;}
    .nav-link:hover{background:#f1f5f9;}
    .nav-active{color:var(--primary)!important;border-color:var(--primary)!important;}

    .main{max-width:1400px;margin:0 auto;padding:20px 24px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow);}
    .card-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .dot{width:8px;height:8px;border-radius:50%;}
    .dot-blue{background:var(--primary);} .dot-green{background:var(--success);} .dot-purple{background:var(--purple);} .dot-orange{background:var(--warning);}

    /* 섹션 구분선 */
    .section-divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px;font-size:12px;font-weight:700;color:var(--text-muted);}
    .section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* 필터 바 */
    .filter-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
    .field{display:flex;flex-direction:column;gap:3px;font-size:10px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
    .field input, .field select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none;background:var(--card);}
    .field input:focus, .field select:focus{border-color:var(--primary);box-shadow:0 0 0 2px #3b82f620;}
    .btn{padding:7px 16px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;height:32px;}
    .btn-blue{background:var(--primary);color:#fff;} .btn-blue:hover{background:var(--primary-hover);}
    .btn-ghost{background:#f1f5f9;color:var(--text-muted);border:1px solid var(--border);} .btn-ghost:hover{background:#e2e8f0;}

    /* 요약 카드 */
    .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
    .sum-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
    .sum-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:10px 0 0 10px;background:var(--primary);}
    .sum-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
    .sum-value{font-size:22px;font-weight:800;color:var(--text);line-height:1;}
    .sum-sub{font-size:10px;color:var(--text-muted);margin-top:6px;}
    .sum-card.c-call::before{background:#22c55e;}
    .sum-card.c-call .sum-value{color:#16a34a;}
    .sum-card.c-err::before{background:#ef4444;}
    .sum-card.c-err .sum-value{color:#dc2626;}
    .sum-card.c-apis::before{background:#8b5cf6;}
    .sum-card.c-apis .sum-value{color:#7c3aed;}
    .sum-card.c-info::before{background:#f59e0b;}

    /* 2열 그리드 */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

    /* 테이블 */
    table{width:100%;border-collapse:collapse;font-size:12px;}
    thead th{background:#f1f5f9;padding:8px 10px;text-align:left;font-weight:700;color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);}
    tbody td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
    tbody tr:hover{background:#f8fafc;}
    .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}
    .api-path{font-family:'Consolas',monospace;font-size:11px;color:#1e40af;word-break:break-all;}
    .repo-badge{display:inline-block;padding:2px 8px;background:#f1f5f9;color:var(--text-muted);border-radius:4px;font-size:10px;font-weight:600;}
    .rank{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;background:#f1f5f9;color:var(--text-muted);font-weight:700;font-size:10px;}
    .rank.r1{background:#fef3c7;color:#d97706;}
    .rank.r2{background:#e5e7eb;color:#4b5563;}
    .rank.r3{background:#fed7aa;color:#9a3412;}

    /* 페이징 */
    .pagination{display:flex;align-items:center;gap:8px;justify-content:flex-end;margin-top:10px;font-size:12px;}
    .page-btn{padding:5px 10px;border:1px solid var(--border);border-radius:4px;background:var(--card);cursor:pointer;font-size:11px;color:var(--text);min-width:32px;}
    .page-btn:hover{background:#f1f5f9;}
    .page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
    .page-btn:disabled{opacity:.5;cursor:not-allowed;}
    .page-info{color:var(--text-muted);font-size:11px;}

    /* 상세 모달 */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:100;align-items:center;justify-content:center;}
    .modal{background:var(--card);border-radius:12px;width:1000px;max-width:95%;max-height:90vh;overflow:auto;box-shadow:0 8px 32px rgba(0,0,0,.25);}
    .modal-header{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1;}
    .modal-header h3{font-size:14px;font-weight:700;}
    .modal-body{padding:16px 22px;}
    .tab-bar{display:flex;gap:4px;margin-bottom:12px;border-bottom:2px solid var(--border);}
    .tab-btn{padding:8px 16px;background:none;border:none;font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
    .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);}

    .loading{text-align:center;padding:40px;color:var(--text-muted);}
    .empty{text-align:center;padding:40px;color:var(--text-muted);font-size:12px;}
    .toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:13px;color:#fff;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
    .toast.show{opacity:1;}
    .toast.error{background:var(--danger);} .toast.success{background:var(--success);}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ─── 다크모드 오버라이드 ─── */
    :root[data-theme="dark"]{
      --bg:#0f172a; --card:#1e293b;
      --text:#f1f5f9; --text-muted:#94a3b8;
      --border:#334155;
      --primary:#60a5fa; --primary-hover:#3b82f6;
      --shadow:0 1px 4px rgba(0,0,0,.4);
    }
    [data-theme="dark"] body{background:var(--bg);color:var(--text);}
    [data-theme="dark"] .header{background:var(--card);border-color:var(--border);}
    [data-theme="dark"] .header-sub{background:#293548!important;}
    [data-theme="dark"] .nav-link{color:var(--text-muted);border-color:var(--border);}
    [data-theme="dark"] .nav-link:hover{background:#293548!important;}
    [data-theme="dark"] .nav-active{color:#93c5fd!important;border-color:#60a5fa!important;background:#1e3a5f!important;}
    [data-theme="dark"] .card{background:var(--card)!important;border-color:var(--border)!important;}
    [data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--card)!important;color:var(--text)!important;border-color:var(--border)!important;}
    [data-theme="dark"] input::placeholder,[data-theme="dark"] textarea::placeholder{color:#64748b!important;}
    [data-theme="dark"] .modal-overlay{background:rgba(0,0,0,.65)!important;}
    [data-theme="dark"] .modal,[data-theme="dark"] .modal-header,[data-theme="dark"] .modal-footer{background:var(--card)!important;border-color:var(--border)!important;}
    [data-theme="dark"] .st-use{background:#052e16!important;color:#4ade80!important;}
    [data-theme="dark"] .st-done{background:#293548!important;color:#94a3b8!important;}
    [data-theme="dark"] .st-del{background:#450a0a!important;color:#f87171!important;}
    [data-theme="dark"] .st-review{background:#1c1408!important;color:#fcd34d!important;}
    [data-theme="dark"] .st-target{background:#431407!important;color:#fb923c!important;}
    [data-theme="dark"] .bt-top{background:#450a0a!important;color:#f87171!important;}
    [data-theme="dark"] .bt-low{background:#431407!important;color:#fb923c!important;}
    [data-theme="dark"] .bt-rev{background:#1c1408!important;color:#fcd34d!important;}
    [data-theme="dark"] .m-GET,[data-theme="dark"] .badge-GET{background:#052e16!important;color:#4ade80!important;}
    [data-theme="dark"] .m-POST,[data-theme="dark"] .badge-POST{background:#1e3a5f!important;color:#93c5fd!important;}
    [data-theme="dark"] .m-PUT,[data-theme="dark"] .badge-PUT{background:#1c1408!important;color:#fcd34d!important;}
    [data-theme="dark"] .m-DELETE,[data-theme="dark"] .badge-DELETE{background:#450a0a!important;color:#f87171!important;}
    [data-theme="dark"] .m-PATCH,[data-theme="dark"] .badge-PATCH{background:#2e1065!important;color:#a78bfa!important;}
    [data-theme="dark"] .m-OTHER,[data-theme="dark"] .badge-REQUEST{background:#293548!important;color:#94a3b8!important;}
    .dark-toggle{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;padding:5px 12px;white-space:nowrap;transition:background .12s,color .12s;}
    .dark-toggle:hover{background:#f1f5f9;color:#1e293b;}
    [data-theme="dark"] .dark-toggle:hover{background:#293548!important;color:#f1f5f9!important;}
    :root[data-theme="dark"]{--warning:#fbbf24;}
    [data-theme="dark"] .chart-card{background:var(--card)!important;border-color:var(--border)!important;}
    [data-theme="dark"] table{border-color:var(--border)!important;}
    [data-theme="dark"] th{background:#293548!important;color:var(--text-muted)!important;}
    [data-theme="dark"] td{border-color:var(--border)!important;}
    /* call-stats 추가 오버라이드 */
    [data-theme="dark"] tbody tr:hover { background:#293548 !important; }
    [data-theme="dark"] .src-MOCK { background:#1c1408 !important; color:#fcd34d !important; }
    [data-theme="dark"] .rank.r1 { background:#1c1408 !important; color:#fbbf24 !important; }
    [data-theme="dark"] .rank.r3 { background:#431407 !important; color:#fb923c !important; }
    [data-theme="dark"] .page-btn:hover { background:#293548 !important; }
    [data-theme="dark"] div[style*="background:#f0fdf4"][style*="color:#166534"] { background:#052e16 !important; color:#4ade80 !important; border-color:#166534 !important; }
    [data-theme="dark"] div[style*="background:#fafbfc"] { background:#1e293b !important; }
    /* 인라인 스타일 다크모드 보편 오버라이드 */
    [data-theme="dark"] [style*="color:#92400e"] { color:#fbbf24 !important; }
    [data-theme="dark"] [style*="color:#1e40af"] { color:#93c5fd !important; }
    [data-theme="dark"] [style*="color:#3730a3"] { color:#a5b4fc !important; }
    [data-theme="dark"] [style*="color:#7c3aed"] { color:#c4b5fd !important; }
    [data-theme="dark"] [style*="color:#6d28d9"] { color:#c4b5fd !important; }
    [data-theme="dark"] [style*="color:#9a3412"] { color:#fb923c !important; }
    [data-theme="dark"] [style*="color:#d97706"] { color:#fbbf24 !important; }
    [data-theme="dark"] [style*="color:#ca8a04"] { color:#fbbf24 !important; }
    [data-theme="dark"] [style*="color:#16a34a"] { color:#4ade80 !important; }
    [data-theme="dark"] [style*="background:#dbeafe"] { background:#1e3a5f !important; }
    [data-theme="dark"] [style*="background:#eff6ff"] { background:#1e3a5f !important; }
    [data-theme="dark"] [style*="background:#fffbeb"] { background:#1c1408 !important; }
    [data-theme="dark"] [style*="background:#fef2f2"] { background:#2d1515 !important; }
    [data-theme="dark"] [style*="background:#fff7ed"] { background:#2d1b0a !important; }
    [data-theme="dark"] [style*="background:#f8fafc"] { background:#1e293b !important; }
    [data-theme="dark"] [style*="color:#991b1b"] { color:#f87171 !important; }
    [data-theme="dark"] [style*="color:#7c2d12"] { color:#fb923c !important; }
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
  </style>
  <meta name="nav-segment" content="url-viewer">
  <meta name="nav-page" content="call-stats">
  <link rel="stylesheet" href="/common/nav.css">
  <script src="/exceljs.min.js"></script>
  <script src="/js/dialog.js"></script>
  <script src="/js/darkmode.js"></script>
</head>
<body>
<div id="nav-container"></div>

<div class="main">

  <!-- ═══════════════════════════════════════════
       상단: 대시보드 (집계 테이블 기반 — 빠름)
  ═══════════════════════════════════════════ -->
  <div class="section-divider">📊 대시보드 (집계 기준)</div>

  <!-- 기간 선택 + 레포 필터 -->
  <div class="card" style="padding-bottom:10px;">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <label class="field" style="margin-top:0;">레포지토리
        <select id="dashRepoSelect" style="min-width:160px;" onchange="loadDashboard()">
          <option value="">(전체)</option>
        </select>
      </label>
      <div class="filter-bar" style="margin:0;">
        <span style="font-size:10px;color:var(--text-muted);font-weight:600;">기간:</span>
        <button class="btn btn-ghost" id="tab-yesterday" onclick="selectPeriod('yesterday')">전일</button>
        <button class="btn btn-ghost" id="tab-week"      onclick="selectPeriod('week')">1주</button>
        <button class="btn btn-blue"  id="tab-month"     onclick="selectPeriod('month')">1달</button>
        <button class="btn btn-ghost" id="tab-3month"    onclick="selectPeriod('3month')">3달</button>
        <button class="btn btn-ghost" id="tab-6month"    onclick="selectPeriod('6month')">6달</button>
        <button class="btn btn-ghost" id="tab-year"      onclick="selectPeriod('year')">1년</button>
      </div>
      <span id="dashUpdatedAt" style="font-size:10px;color:var(--text-muted);margin-left:auto;"></span>
    </div>
  </div>

  <!-- 요약 카드 -->
  <div class="summary-grid">
    <div class="sum-card c-call">
      <div class="sum-label">총 호출건수</div>
      <div class="sum-value" id="dashCall">-</div>
      <div class="sum-sub" id="dashCallSub"></div>
    </div>
    <div class="sum-card c-err">
      <div class="sum-label">총 에러건수</div>
      <div class="sum-value" id="dashErr">-</div>
      <div class="sum-sub" id="dashErrPct"></div>
    </div>
    <div class="sum-card c-apis">
      <div class="sum-label">레포 수</div>
      <div class="sum-value" id="dashRepos">-</div>
      <div class="sum-sub" id="dashApiCount"></div>
    </div>
    <div class="sum-card c-info">
      <div class="sum-label" style="margin-bottom:6px;">집계 기준</div>
      <div style="font-size:11px;color:var(--text-muted);line-height:1.6;" id="dashPeriodDesc">-</div>
    </div>
  </div>

  <!-- 레포별 요약 + TOP 10 -->
  <div class="two-col">
    <div class="card">
      <div class="card-title"><span class="dot dot-purple"></span>레포별 호출 요약</div>
      <div style="max-height:320px;overflow:auto;">
        <table>
          <thead><tr>
            <th>레포지토리</th>
            <th class="num">호출건수</th>
            <th class="num">에러</th>
            <th class="num">API 수</th>
          </tr></thead>
          <tbody id="dashByRepoTbody"><tr><td colspan="4" class="empty">기간을 선택하세요</td></tr></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot dot-orange"></span>TOP 10 호출 URL</div>
      <div style="max-height:320px;overflow:auto;">
        <table>
          <thead><tr>
            <th style="width:28px;">#</th>
            <th>URL</th>
            <th class="num">호출</th>
            <th class="num">에러</th>
          </tr></thead>
          <tbody id="dashTopTbody"><tr><td colspan="4" class="empty">기간을 선택하세요</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       하단: 실시간 조회 (apm_call_data 직접)
  ═══════════════════════════════════════════ -->
  <div class="section-divider">🔍 URL 실시간 조회 (임의 기간)</div>

  <!-- 조회 필터 -->
  <div class="card">
    <div class="filter-bar" style="margin-bottom:8px;">
      <label class="field">레포지토리
        <select id="queryRepoSelect" style="min-width:180px;">
          <option value="">(전체 — URL 검색 권장)</option>
        </select>
      </label>
      <label class="field">시작일<input id="fromDate" type="date"></label>
      <label class="field">종료일<input id="toDate"   type="date"></label>
      <label class="field">URL 검색
        <input id="searchInput" type="text" placeholder="URL 경로 검색..." style="min-width:220px;">
      </label>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <span style="font-size:10px;color:var(--text-muted);font-weight:600;">기간:</span>
      <button class="btn btn-ghost" onclick="setDateYesterday()">전일</button>
      <button class="btn btn-ghost" onclick="setDate(7)">1주</button>
      <button class="btn btn-ghost" onclick="setDate(30)">1달</button>
      <button class="btn btn-ghost" onclick="setDate(90)">3달</button>
      <button class="btn btn-ghost" onclick="setDate(180)">6달</button>
      <button class="btn btn-ghost" onclick="setDate(365)">1년</button>
      <div style="width:1px;height:20px;background:var(--border);margin:0 4px;"></div>
      <button class="btn btn-blue" onclick="querySearch()">조회</button>
    </div>
    <div style="margin-top:8px;font-size:10px;color:var(--text-muted);">
      ※ 레포 미선택 + URL 미입력 시 전체 조회로 수십 초 이상 소요될 수 있습니다.
    </div>
  </div>

  <!-- URL별 집계 테이블 -->
  <div class="card" id="queryResultCard" style="display:none;">
    <div class="card-title" style="display:flex;align-items:center;">
      <span class="dot dot-blue"></span>URL별 집계
      <span id="resultCount" style="margin-left:10px;font-size:11px;font-weight:400;color:var(--text-muted);text-transform:none;letter-spacing:0;"></span>
    </div>
    <table>
      <thead><tr>
        <th style="width:40px;text-align:center;">No.</th>
        <th>URL</th>
        <th>레포</th>
        <th class="num">호출건수</th>
        <th class="num">에러건수</th>
        <th class="num">상세</th>
      </tr></thead>
      <tbody id="apiTbody"><tr><td colspan="6" class="empty">조회 버튼을 클릭하세요</td></tr></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<!-- 상세 모달 -->
<div id="detailModal" class="modal-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="detailTitle">URL 상세</h3>
      <button class="btn btn-ghost" onclick="closeDetail()">닫기 ✕</button>
    </div>
    <div class="modal-body">
      <div class="tab-bar">
        <button class="tab-btn active" id="tabList"  onclick="switchDetailTab('list')">📋 목록</button>
        <button class="tab-btn"        id="tabChart" onclick="switchDetailTab('chart')">📊 그래프 (1년)</button>
      </div>
      <div id="detailBody"><div class="loading">로딩 중...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let currentPage = 0, currentSize = 200, pageNavSize = 10;
  let currentPeriod = 'month';
  let currentDetail = { repo:'', apiPath:'', tab:'list' };
  let detailMonthRows = [], detailDailyRows = [];

  // ── 유틸 ──────────────────────────────────────────────
  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }
  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmt(n) { return (n||0).toLocaleString(); }
  function spinnerCell(colspan) {
    return `<tr><td colspan="${colspan}" style="text-align:center;padding:30px;"><div class="spinner" style="width:20px;height:20px;border-width:2px;"></div><br><span style="color:var(--text-muted);font-size:11px;">조회 중...</span></td></tr>`;
  }

  // ── 초기화 ────────────────────────────────────────────
  async function init() {
    try {
      const gRes = await fetch('/api/config/global');
      const g = await gRes.json();
      if (g.pageSize)    currentSize    = g.pageSize;
      if (g.pageNavSize) pageNavSize    = g.pageNavSize;
    } catch(e) {}

    const today = new Date();
    const from  = new Date(today); from.setDate(today.getDate() - 30);
    document.getElementById('toDate').value   = today.toLocaleDateString('sv-SE');
    document.getElementById('fromDate').value = from.toLocaleDateString('sv-SE');

    try {
      const res = await fetch('/api/config/repos');
      const repos = await res.json();
      [document.getElementById('dashRepoSelect'), document.getElementById('queryRepoSelect')]
        .forEach(sel => {
          repos.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r.repoName;
            opt.textContent = r.businessName ? `${r.repoName} | ${r.businessName}` : r.repoName;
            sel.appendChild(opt);
          });
        });
    } catch(e) {}

    // 대시보드 초기 로드
    await loadDashboard();
  }

  // ══════════════════════════════════════════════════════
  // 상단: 대시보드
  // ══════════════════════════════════════════════════════
  const PERIOD_LABEL = {
    yesterday:'전일', week:'최근 1주', month:'최근 1달',
    '3month':'최근 3달', '6month':'최근 6달', year:'최근 1년'
  };

  function selectPeriod(p) {
    currentPeriod = p;
    ['yesterday','week','month','3month','6month','year'].forEach(key => {
      const el = document.getElementById(`tab-${key}`);
      if (!el) return;
      el.className = key === p ? 'btn btn-blue' : 'btn btn-ghost';
    });
    loadDashboard();
  }

  async function loadDashboard() {
    const repo = document.getElementById('dashRepoSelect').value;
    const params = new URLSearchParams({ period: currentPeriod, topN: 10 });
    if (repo) params.set('repo', repo);

    document.getElementById('dashCall').innerHTML = '<div class="spinner"></div>';
    document.getElementById('dashErr').innerHTML  = '<div class="spinner"></div>';
    document.getElementById('dashRepos').innerHTML = '<div class="spinner"></div>';
    document.getElementById('dashByRepoTbody').innerHTML = spinnerCell(4);
    document.getElementById('dashTopTbody').innerHTML    = spinnerCell(4);

    try {
      const res = await fetch(`/api/call-stats/dashboard?${params}`);
      const d   = await res.json();

      document.getElementById('dashCall').textContent  = fmt(d.totalCallCount);
      document.getElementById('dashErr').textContent   = fmt(d.totalErrorCount);
      const errPct = d.totalCallCount > 0 ? ((d.totalErrorCount/d.totalCallCount)*100).toFixed(2) : '0.00';
      document.getElementById('dashErrPct').textContent = `에러율 ${errPct}%`;
      document.getElementById('dashRepos').textContent  = fmt((d.byRepo||[]).length);
      const totalApis = (d.byRepo||[]).reduce((s,r) => s + r.apiCount, 0);
      document.getElementById('dashApiCount').textContent = `API 총 ${fmt(totalApis)}개`;
      document.getElementById('dashCallSub').textContent  = PERIOD_LABEL[currentPeriod] || currentPeriod;
      document.getElementById('dashPeriodDesc').innerHTML =
        `기간: <b>${PERIOD_LABEL[currentPeriod]||currentPeriod}</b><br>` +
        (d.updatedAt ? `집계: ${d.updatedAt.replace('T',' ').slice(0,16)}` : '집계 데이터 없음');
      document.getElementById('dashUpdatedAt').textContent =
        d.updatedAt ? `집계일시: ${d.updatedAt.replace('T',' ').slice(0,16)}` : '';

      // 레포별
      const repoTbody = document.getElementById('dashByRepoTbody');
      if (!d.byRepo || !d.byRepo.length) {
        repoTbody.innerHTML = '<tr><td colspan="4" class="empty">데이터 없음</td></tr>';
      } else {
        repoTbody.innerHTML = d.byRepo.map(r => `
          <tr style="cursor:pointer;" onclick="filterQueryByRepo('${esc(r.repoName)}')">
            <td><span class="repo-badge">${esc(r.repoName)}</span></td>
            <td class="num">${fmt(r.callCount)}</td>
            <td class="num" style="color:${r.errorCount>0?'#dc2626':'inherit'};">${fmt(r.errorCount)}</td>
            <td class="num">${fmt(r.apiCount)}</td>
          </tr>`).join('');
      }

      // TOP 10
      const topTbody = document.getElementById('dashTopTbody');
      if (!d.topApis || !d.topApis.length) {
        topTbody.innerHTML = '<tr><td colspan="4" class="empty">데이터 없음 (집계 실행 후 표시)</td></tr>';
      } else {
        topTbody.innerHTML = d.topApis.map((r, i) => {
          const rankCls = i < 3 ? `rank r${i+1}` : 'rank';
          return `<tr style="cursor:pointer;" onclick="openDetail('${esc(r.repoName)}','${esc(r.apiPath)}')">
            <td><span class="${rankCls}">${i+1}</span></td>
            <td><div class="api-path">${esc(r.apiPath)}</div><span class="repo-badge" style="font-size:9px;margin-top:2px;">${esc(r.repoName)}</span></td>
            <td class="num">${fmt(r.callCount)}</td>
            <td class="num" style="color:${r.errorCount>0?'#dc2626':'inherit'};">${fmt(r.errorCount)}</td>
          </tr>`;
        }).join('');
      }
    } catch(e) { showToast('대시보드 조회 실패: ' + e.message, 'error'); }
  }

  // 레포별 행 클릭 → 하단 조회 레포 필터 세팅 + 스크롤
  function filterQueryByRepo(repoName) {
    document.getElementById('queryRepoSelect').value = repoName;
    document.getElementById('queryResultCard').scrollIntoView({ behavior:'smooth' });
  }

  // ══════════════════════════════════════════════════════
  // 하단: 실시간 조회
  // ══════════════════════════════════════════════════════
  function setDate(days) {
    const today = new Date();
    const from  = new Date(today); from.setDate(today.getDate() - days);
    document.getElementById('toDate').value   = today.toLocaleDateString('sv-SE');
    document.getElementById('fromDate').value = from.toLocaleDateString('sv-SE');
  }
  function setDateYesterday() {
    const y = new Date(Date.now()-86400000).toLocaleDateString('sv-SE');
    document.getElementById('fromDate').value = y;
    document.getElementById('toDate').value   = y;
  }

  async function querySearch() {
    const repo = document.getElementById('queryRepoSelect').value;
    const q    = document.getElementById('searchInput').value.trim();
    // 전체 레포 + URL 미입력 경고
    if (!repo && !q) {
      const ok = await customConfirm(
        '레포지토리 미선택 + URL 미입력 상태에서 전체 조회를 실행합니다.\n' +
        '데이터 규모에 따라 수십 초 이상 소요될 수 있습니다.\n계속하시겠습니까?'
      );
      if (!ok) return;
    }
    currentPage = 0;
    document.getElementById('queryResultCard').style.display = 'block';
    await loadApis();
  }

  async function loadApis() {
    document.getElementById('apiTbody').innerHTML = spinnerCell(6);
    document.getElementById('resultCount').textContent = '조회 중...';
    try {
      const params = new URLSearchParams();
      const from = document.getElementById('fromDate').value;
      const to   = document.getElementById('toDate').value;
      const repo = document.getElementById('queryRepoSelect').value;
      const q    = document.getElementById('searchInput').value.trim();
      if (from) params.set('from', from);
      if (to)   params.set('to',   to);
      if (repo) params.set('repo', repo);
      if (q)    params.set('q',    q);
      params.set('page', currentPage);
      params.set('size', currentSize);

      const res = await fetch(`/api/call-stats/apis?${params}`);
      const d   = await res.json();
      const tbody = document.getElementById('apiTbody');

      if (!d.items || !d.items.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">검색 결과가 없습니다.</td></tr>';
      } else {
        const maxCall = Math.max(1, ...d.items.map(i => i.totalCall));
        const barCell = (val, max, color) => {
          const pct = Math.max(2, Math.round((val/max)*100));
          return `<td class="num" style="position:relative;">
            <div style="position:absolute;left:0;top:0;bottom:0;width:${pct}%;background:${color};opacity:.15;pointer-events:none;"></div>
            <span style="position:relative;font-weight:700;">${fmt(val)}</span>
          </td>`;
        };
        const startNo = d.page * d.size;
        tbody.innerHTML = d.items.map((a, idx) => `
          <tr>
            <td style="text-align:center;color:var(--text-muted);font-size:11px;">${startNo+idx+1}</td>
            <td><div class="api-path">${esc(a.apiPath)}</div></td>
            <td><span class="repo-badge">${esc(a.repoName)}</span></td>
            ${barCell(a.totalCall, maxCall, '#3b82f6')}
            <td class="num" style="color:${a.totalError>0?'#dc2626':'inherit'};">${fmt(a.totalError)}</td>
            <td class="num"><button class="btn btn-ghost" style="font-size:10px;padding:3px 10px;height:auto;" onclick="openDetail('${esc(a.repoName)}','${esc(a.apiPath)}')">상세</button></td>
          </tr>`).join('');
      }
      document.getElementById('resultCount').textContent =
        `총 ${fmt(d.totalElements)}개 (페이지 ${d.page+1}/${d.totalPages||1}) · ${d.from} ~ ${d.to}`;
      renderPagination(d);
    } catch(e) { showToast('목록 조회 실패: ' + e.message, 'error'); }
  }

  function renderPagination(data) {
    const el = document.getElementById('pagination');
    const total = data.totalPages || 1;
    const cur   = data.page || 0;
    if (total <= 1) { el.innerHTML = ''; return; }
    let html = `<span class="page-info">총 ${fmt(data.totalElements)}건 / ${total}페이지</span>`;
    html += `<button class="page-btn" onclick="gotoPage(0)" ${cur===0?'disabled':''}>≪</button>`;
    html += `<button class="page-btn" onclick="gotoPage(${cur-1})" ${cur===0?'disabled':''}>‹</button>`;
    const half = Math.floor(pageNavSize/2);
    let start = Math.max(0, cur-half);
    let end   = Math.min(total-1, start+pageNavSize-1);
    if (end-start+1 < pageNavSize) start = Math.max(0, end-pageNavSize+1);
    for (let i = start; i <= end; i++) {
      html += `<button class="page-btn ${i===cur?'active':''}" onclick="gotoPage(${i})">${i+1}</button>`;
    }
    html += `<button class="page-btn" onclick="gotoPage(${cur+1})" ${cur>=total-1?'disabled':''}>›</button>`;
    html += `<button class="page-btn" onclick="gotoPage(${total-1})" ${cur>=total-1?'disabled':''}>≫</button>`;
    el.innerHTML = html;
  }
  function gotoPage(p) {
    currentPage = p;
    loadApis();
    document.getElementById('queryResultCard').scrollIntoView({behavior:'smooth',block:'start'});
  }

  // ══════════════════════════════════════════════════════
  // 상세 모달
  // ══════════════════════════════════════════════════════
  async function openDetail(repo, apiPath) {
    currentDetail = { repo, apiPath, tab:'list' };
    document.getElementById('detailTitle').textContent = `${apiPath}  (${repo})`;
    document.getElementById('detailModal').style.display = 'flex';
    document.getElementById('tabList').classList.add('active');
    document.getElementById('tabChart').classList.remove('active');
    await loadDetail();
  }
  function closeDetail() {
    document.getElementById('detailModal').style.display = 'none';
    const tip = document.getElementById('csChartTooltip'); if (tip) tip.style.display = 'none';
  }
  function switchDetailTab(tab) {
    currentDetail.tab = tab;
    document.getElementById('tabList').classList.toggle('active',  tab==='list');
    document.getElementById('tabChart').classList.toggle('active', tab==='chart');
    loadDetail();
  }
  async function loadDetail() {
    const body = document.getElementById('detailBody');
    body.innerHTML = '<div class="loading">로딩 중...</div>';
    if (currentDetail.tab === 'chart') { await loadDetailChart(); return; }
    await loadDetailList();
  }

  async function loadDetailList() {
    const body = document.getElementById('detailBody');
    const params = new URLSearchParams({
      repo: currentDetail.repo, apiPath: currentDetail.apiPath,
      from: new Date(Date.now()-364*86400000).toLocaleDateString('sv-SE'),
      to:   new Date().toLocaleDateString('sv-SE')
    });
    try {
      const [monthRes, dailyRes] = await Promise.all([
        fetch(`/api/call-stats/monthly?${params}`),
        fetch(`/api/call-stats/daily?${params}`)
      ]);
      const monthData = await monthRes.json();
      const dailyData = await dailyRes.json();
      detailMonthRows = monthData.rows || [];
      detailDailyRows = dailyData.rows || [];

      if (!detailDailyRows.length && !detailMonthRows.length) {
        body.innerHTML = '<div class="empty">데이터 없음</div>'; return;
      }

      let html = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div style="flex:1;font-size:13px;font-weight:700;padding:10px 14px;background:#f0fdf4;border-left:4px solid #22c55e;border-radius:4px;color:#166534;font-family:monospace;word-break:break-all;">
          📍 ${esc(currentDetail.apiPath)}</div>
        <button class="btn" style="background:#22c55e;color:#fff;height:34px;flex-shrink:0;" onclick="downloadDetailExcel()">⬇ 엑셀 다운로드</button>
      </div>`;

      if (detailMonthRows.length) {
        const monthMap = {};
        detailMonthRows.forEach(r => {
          if (!monthMap[r.month]) monthMap[r.month] = {month:r.month,callCount:0,errorCount:0};
          monthMap[r.month].callCount += r.callCount;
          monthMap[r.month].errorCount += r.errorCount;
        });
        const months = Object.values(monthMap).sort((a,b) => b.month.localeCompare(a.month));
        const totalCall = months.reduce((s,m) => s+m.callCount, 0);
        const totalErr  = months.reduce((s,m) => s+m.errorCount, 0);
        html += `<div style="margin-bottom:16px;">
          <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px;">📅 월별 합계</div>
          <table><thead><tr><th>월</th><th class="num">호출건수</th><th class="num">에러건수</th></tr></thead><tbody>
          ${months.map(m => `<tr>
            <td style="font-weight:600;">${esc(m.month)}</td>
            <td class="num">${fmt(m.callCount)}</td>
            <td class="num" style="color:${m.errorCount>0?'#dc2626':'inherit'};">${fmt(m.errorCount)}</td>
          </tr>`).join('')}
          <tr style="border-top:2px solid var(--border);font-weight:700;background:#f1f5f9;">
            <td>합계</td><td class="num">${fmt(totalCall)}</td>
            <td class="num" style="color:${totalErr>0?'#dc2626':'inherit'};">${fmt(totalErr)}</td>
          </tr></tbody></table></div>`;
      }

      html += `<div>
        <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px;">📋 일별 상세 (${fmt(detailDailyRows.length)}건)</div>
        <div style="max-height:400px;overflow:auto;">
        <table><thead style="position:sticky;top:0;z-index:1;"><tr>
          <th>일자</th><th>APM</th><th class="num">호출건수</th><th class="num">에러건수</th>
        </tr></thead><tbody>
        ${detailDailyRows.map(r => `<tr>
          <td>${esc(r.callDate)}</td>
          <td><span style="padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;background:#dbeafe;color:#1e40af;">${esc(r.source)}</span></td>
          <td class="num">${fmt(r.callCount)}</td>
          <td class="num" style="color:${r.errorCount>0?'#dc2626':'inherit'};">${fmt(r.errorCount)}</td>
        </tr>`).join('')}
        </tbody></table></div></div>`;

      body.innerHTML = html;
    } catch(e) {
      body.innerHTML = `<div class="empty">조회 실패: ${esc(e.message)}</div>`;
    }
  }

  async function loadDetailChart() {
    const body = document.getElementById('detailBody');
    try {
      const url = `/api/apm/chart?repoName=${encodeURIComponent(currentDetail.repo)}&apiPath=${encodeURIComponent(currentDetail.apiPath)}&bucket=daily&days=365`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('조회 실패');
      renderDetailChartSvg(await res.json());
    } catch(e) {
      body.innerHTML = `<div class="empty">조회 실패: ${esc(e.message)}</div>`;
    }
  }

  function renderDetailChartSvg(data) {
    const body = document.getElementById('detailBody');
    const buckets  = data.buckets || [];
    const totalCall = buckets.reduce((s,b) => s+(b.callCount||0), 0);
    const totalErr  = buckets.reduce((s,b) => s+(b.errorCount||0), 0);
    const maxCall   = Math.max(0, ...buckets.map(b => b.callCount||0));

    const header = `<div style="font-size:14px;font-weight:700;padding:10px 14px;margin-bottom:8px;background:#f0fdf4;border-left:4px solid #22c55e;border-radius:4px;color:#166534;font-family:monospace;word-break:break-all;">
      📍 ${esc(data.apiPath)}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">
        <b>${esc(data.repoName)}</b> · 일단위 · 최근 1년 ·
        합계 호출 <b style="color:#16a34a;">${fmt(totalCall)}</b>건 ·
        합계 에러 <b style="color:#db2777;">${fmt(totalErr)}</b>건 ·
        기간 ${data.from} ~ ${data.to}
      </div>`;

    if (!buckets.length || totalCall === 0) {
      body.innerHTML = header + '<div class="empty">해당 기간에 호출이력이 없습니다.</div>'; return;
    }

    const ys = calcYScale(maxCall);
    const yMax = ys.yMax, tickStep = ys.tickStep;
    const ticks = [];
    for (let v = 0; v <= yMax; v += tickStep) ticks.push(v);

    const chartHeight = 220;
    let barWidth, barGap;
    if (buckets.length <= 7)       { barWidth=70; barGap=20; }
    else if (buckets.length <= 31) { barWidth=28; barGap=6; }
    else                           { barWidth=20; barGap=3; }
    const chartMinWidth = buckets.length * (barWidth + barGap) + 10;
    let labelSkip = 1;
    if (buckets.length > 200) labelSkip=14;
    else if (buckets.length > 60) labelSkip=7;
    else if (buckets.length > 14) labelSkip=2;

    const yLabels  = ticks.slice().reverse().map(v => `<div>${v.toLocaleString()}</div>`).join('');
    const gridLines = ticks.map(v => {
      const pct = (v/yMax)*100;
      return `<div style="position:absolute;left:0;right:0;bottom:${pct}%;height:1px;background:${v===0?'#94a3b8':'#e2e8f0'};"></div>`;
    }).join('');

    const columns = buckets.map(b => {
      const call = b.callCount||0, err = Math.min(b.errorCount||0, call);
      const callH = (call/yMax)*chartHeight, errH = (err/yMax)*chartHeight;
      const greenH = Math.max(0, callH-errH);
      const ym  = fmtYearMD(b.label);
      const tip = `${ym.year} ${ym.md} ${ym.dow}\n호출: ${call.toLocaleString()}건\n에러: ${(b.errorCount||0).toLocaleString()}건`;
      return `<div class="cs-chart-col" data-tip="${esc(tip)}" style="width:${barWidth}px;height:${chartHeight}px;margin-right:${barGap}px;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer;">
        ${errH>0?`<div style="background:#ec4899;height:${errH}px;width:100%;"></div>`:''}
        ${greenH>0?`<div style="background:#22c55e;height:${greenH}px;width:100%;"></div>`:''}
      </div>`;
    }).join('');

    const xLabels = buckets.map((b,i) => {
      const show = (i%labelSkip===0) || i===buckets.length-1;
      if (!show) return `<div style="width:${barWidth}px;margin-right:${barGap}px;"></div>`;
      const ym = fmtYearMD(b.label);
      const dowColor = ym.dowIdx===0?'#dc2626':(ym.dowIdx===6?'#2563eb':'#64748b');
      return `<div style="width:${barWidth}px;margin-right:${barGap}px;font-size:8px;color:#64748b;text-align:center;line-height:1.25;">
        <span style="color:#94a3b8;">${esc(ym.year)}</span><br><span style="font-weight:600;color:#475569;">${esc(ym.md)}</span><br><span style="color:${dowColor};font-weight:600;">${esc(ym.dow)}</span>
      </div>`;
    }).join('');

    body.innerHTML = header + `
      <div style="display:flex;gap:8px;padding:10px;background:#fafbfc;border-radius:8px;">
        <div style="display:flex;flex-direction:column;justify-content:space-between;height:${chartHeight}px;min-width:50px;text-align:right;font-size:10px;color:#64748b;">${yLabels}</div>
        <div style="flex:1;overflow-x:auto;" id="csChartWrap">
          <div style="position:relative;height:${chartHeight}px;min-width:${chartMinWidth}px;border-left:1px solid #94a3b8;border-bottom:1px solid #94a3b8;">
            ${gridLines}
            <div style="display:flex;align-items:flex-end;padding:0 4px;height:100%;position:relative;z-index:1;">${columns}</div>
          </div>
          <div style="display:flex;padding:0 4px;margin-top:6px;min-width:${chartMinWidth}px;min-height:36px;">${xLabels}</div>
        </div>
      </div>
      <div style="margin-top:10px;display:flex;gap:16px;font-size:11px;color:var(--text-muted);">
        <span><span style="display:inline-block;width:12px;height:12px;background:#22c55e;border-radius:2px;vertical-align:middle;margin-right:4px;"></span>호출건수</span>
        <span><span style="display:inline-block;width:12px;height:12px;background:#ec4899;border-radius:2px;vertical-align:middle;margin-right:4px;"></span>에러건수</span>
      </div>`;

    setTimeout(() => { const w = document.getElementById('csChartWrap'); if(w) w.scrollLeft = w.scrollWidth; }, 50);

    let tip = document.getElementById('csChartTooltip');
    if (!tip) {
      tip = document.createElement('div');
      tip.id = 'csChartTooltip';
      tip.style.cssText = 'position:fixed;background:#1e293b;color:#fff;font-size:11px;line-height:1.5;padding:6px 10px;border-radius:6px;white-space:pre;pointer-events:none;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.3);display:none;';
      document.body.appendChild(tip);
    }
    body.querySelectorAll('.cs-chart-col').forEach(col => {
      col.addEventListener('mouseenter', () => { tip.textContent = col.dataset.tip||''; tip.style.display='block'; });
      col.addEventListener('mousemove',  e => {
        let left=e.clientX+14, top=e.clientY-60;
        if (left+140>window.innerWidth) left=e.clientX-154;
        if (top<8) top=e.clientY+18;
        tip.style.left=left+'px'; tip.style.top=top+'px';
      });
      col.addEventListener('mouseleave', () => { tip.style.display='none'; });
    });
  }

  // ── 엑셀 다운로드 ──────────────────────────────────────
  async function downloadDetailExcel() {
    const wb = new ExcelJS.Workbook();
    const ws1 = wb.addWorksheet('Monthly');
    ws1.addRow([`URL: ${currentDetail.apiPath}`]);
    ws1.addRow([`레포: ${currentDetail.repo}`]);
    ws1.addRow([]);
    const mh = ws1.addRow(['월','호출건수','에러건수']);
    mh.eachCell(c => { c.font={bold:true}; c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFE0F2FE'}}; });
    const monthMap = {};
    detailMonthRows.forEach(r => {
      if (!monthMap[r.month]) monthMap[r.month]={callCount:0,errorCount:0};
      monthMap[r.month].callCount += r.callCount;
      monthMap[r.month].errorCount += r.errorCount;
    });
    Object.entries(monthMap).sort((a,b) => b[0].localeCompare(a[0])).forEach(([m,v]) => ws1.addRow([m,v.callCount,v.errorCount]));
    ws1.columns = [{width:14},{width:14},{width:14}];
    if (ws1.rowCount>4) ws1.autoFilter = {from:'A4',to:'C4'};

    const ws2 = wb.addWorksheet('Daily');
    ws2.addRow([`URL: ${currentDetail.apiPath}`]);
    ws2.addRow([`레포: ${currentDetail.repo}`]);
    ws2.addRow([]);
    const dh = ws2.addRow(['일자','APM종류','호출건수','에러건수']);
    dh.eachCell(c => { c.font={bold:true}; c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFE0F2FE'}}; });
    detailDailyRows.forEach(r => ws2.addRow([r.callDate,r.source,r.callCount,r.errorCount]));
    ws2.columns = [{width:14},{width:12},{width:14},{width:14}];
    if (ws2.rowCount>4) ws2.autoFilter = {from:'A4',to:'D4'};

    const buf = await wb.xlsx.writeBuffer();
    const blob = new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `호출현황_${currentDetail.repo}_${currentDetail.apiPath.replace(/\//g,'_')}.xlsx`;
    a.click(); URL.revokeObjectURL(a.href);
  }

  // ── 유틸 ──────────────────────────────────────────────
  function calcYScale(maxVal) {
    if (maxVal<=0) return {yMax:10,tickStep:1};
    const rough = maxVal/8;
    const magnitude = Math.pow(10, Math.floor(Math.log10(rough)));
    const normalized = rough/magnitude;
    let tickStep;
    if (normalized<1.5) tickStep=1*magnitude;
    else if (normalized<3) tickStep=2*magnitude;
    else if (normalized<7) tickStep=5*magnitude;
    else tickStep=10*magnitude;
    return {yMax:Math.ceil(maxVal/tickStep)*tickStep, tickStep};
  }
  function fmtYearMD(s) {
    if (!s) return {year:'',md:'',dow:'',dowIdx:-1};
    const m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (!m) return {year:'',md:s,dow:'',dowIdx:-1};
    const d = new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
    const dowIdx = d.getDay();
    const dowNames = ['일','월','화','수','목','금','토'];
    return {year:`${m[1].slice(2)}년`, md:`${parseInt(m[2])}월${parseInt(m[3])}일`, dow:`(${dowNames[dowIdx]})`, dowIdx};
  }

  // Enter 키 조회
  document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') querySearch(); });

  init();
</script>
