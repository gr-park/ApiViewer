server.port=${PORT:8080}
server.address=0.0.0.0
spring.main.web-environment=true
spring.application.name=ApiViewer

# 기본값 설정 (화면에서 덮어쓸 수 있음)
api.viewer.git-bin-path=git
api.viewer.repos-config-path=./repos-config.yml

# ── DB 설정 ── 사용할 DB에 맞게 아래 블록 중 하나를 활성화하세요.

# [H2 파일 DB]
spring.datasource.url=jdbc:h2:file:./data/api-viewer-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# [PostgreSQL] ─── H2 사용 시 아래를 주석 처리하세요 ───
#spring.datasource.url=jdbc:postgresql://localhost:5432/api_viewer
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.datasource.username=postgres
#spring.datasource.password=postgres
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JDBC 배치 INSERT 성능 최적화 (saveAll 시 N개 단위로 묶어서 전송)
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
# 쿼리 튜닝: in-clause 파라미터 패딩 (prepared statement 캐시 히트율 향상)
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

# HikariCP 커넥션풀 (대용량 동시 요청 대비)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=ApiViewerHikariPool

# OSIV 비활성화 — Lazy 로딩 예외를 명시적으로 관리하여 세션 누수/N+1 방지
spring.jpa.open-in-view=false

# H2 콘솔
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 메일: JavaMailSender를 DB 설정 기반으로 동적 생성 (Spring 자동구성 비활성화)
spring.mail.host=localhost
spring.mail.port=25

# Quartz (org.quartz-scheduler:quartz:2.3.2 직접 사용 — QuartzConfig.java에서 수동 구성)

# 로깅: logback-spring.xml에서 관리 (콘솔+파일, MDC IP/관리자, 일자별 롤링 90일)
