server.port=80
server.address=0.0.0.0
spring.main.web-environment=true
spring.application.name=ApiViewer

# 기본값 설정 (화면에서 덮어쓸 수 있음)
api.viewer.git-bin-path=git
api.viewer.repos-config-path=./repos-config.yml

# H2 파일 DB
spring.datasource.url=jdbc:h2:file:./data/api-viewer-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JDBC 배치 INSERT 성능 최적화 (saveAll 시 N개 단위로 묶어서 전송)
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Quartz (org.quartz-scheduler:quartz:2.3.2 직접 사용 — QuartzConfig.java에서 수동 구성)

# 로깅: logback-spring.xml에서 관리 (콘솔+파일, MDC IP/관리자, 일자별 롤링 90일)
