server.port=8080
server.address=0.0.0.0
spring.main.web-environment=true
spring.application.name=ApiViewer

# 기본값 설정 (화면에서 덮어쓸 수 있음)
api.viewer.git-bin-path=git
api.viewer.repos-config-path=./repos-config.yml

# H2 파일 DB
spring.datasource.url=jdbc:h2:file:./data/api-viewer-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Quartz
spring.quartz.job-store-type=memory

# 로깅: logback-spring.xml에서 관리 (콘솔+파일, MDC IP/관리자, 일자별 롤링 90일)
