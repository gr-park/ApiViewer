server.port=80
server.address=0.0.0.0
spring.main.web-environment=true
spring.application.name=ApiViewer

# 기본값 설정 (화면에서 덮어쓸 수 있음)
api.viewer.git-bin-path=git
api.viewer.repos-config-path=./repos-config.yml

# ── DB 설정 ── 사용할 DB에 맞게 아래 블록 중 하나를 활성화하세요.

# [H2 파일 DB]
spring.datasource.url=jdbc:h2:file:./data/api-viewer-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# [PostgreSQL] ─── H2 사용 시 아래를 주석 처리하세요 ───
#spring.datasource.url=jdbc:postgresql://localhost:5432/api_viewer
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.datasource.username=postgres
#spring.datasource.password=postgres
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JDBC 배치 INSERT 성능 최적화 (saveAll 시 N개 단위로 묶어서 전송)
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# H2 콘솔
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 메일: JavaMailSender를 DB 설정 기반으로 동적 생성 (Spring 자동구성 비활성화)
spring.mail.host=localhost
spring.mail.port=25

# Quartz (org.quartz-scheduler:quartz:2.3.2 직접 사용 — QuartzConfig.java에서 수동 구성)

