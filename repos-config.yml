# 공통 설정
global:
  period:
    startDate: "20250201"
    endDate: "20260220"
  reviewThreshold: 3
  password: "lotte1!"
  gitBinPath: git                                # 공통 git 경로 (레포별 오버라이드 가능)

  # 와탭 공통 프로필 (URL/쿠키를 공유, 레포에서 profileName으로 참조)
  whatapProfiles:
    - name: "운영"
      url: ""                                    # 예: https://whatap-prod.internal/api/...
      cookie: ""
    - name: "개발"
      url: ""                                    # 예: https://whatap-dev.internal/api/...
      cookie: ""

