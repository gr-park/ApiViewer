# =====================================================
# URL Viewer 레포지토리 설정 파일
# 이 파일을 수정한 후 settings 화면에서 [YAML 가져오기]를 클릭하세요.
# =====================================================

# 공통 설정
global:
  reviewThreshold: 3      # 호출건수 기준으로 차단대상 판단 시 1~최대 허용할수 있는 건수, 예) 1~3건은 차단대상으로 본다.
  password: "123"
  gitBinPath: git
  pageSize: 200            # 페이지당 표시 건수 (URL호출현황 등)
  pageNavSize: 10          # 페이지 네비게이션 표시 개수

  # 팀 목록 (현업검토/담당자 입력 시 자동완성용 — 오타/공백 방지)
  teams:
    - IT카드개발팀
    - IT커머스개발팀
    - IT인프라팀
    - IT기반기술팀
    - 결제사업팀
    - 대출사업팀
    - 멤버십운영팀
    - 보안관리팀

  # 메일 발송 설정
  smtpHost: ""                    # SMTP 서버 (예: smtp.company.com)
  smtpPort: 25                    # SMTP 포트 (25, 587 등)
  smtpUsername: ""                # SMTP 인증 계정 (없으면 빈값)
  smtpPassword: ""                # SMTP 인증 비밀번호
  mailFrom: "apiviewer@company.com"  # 발신자 메일주소
  mailTo: "admin@company.com"     # 기본 수신자 (쉼표 구분 복수 가능)

  # 로그 레벨 (INFO: 기본 / DEBUG: API파싱 과정 + APM 요청/응답 전문 + 전체 상세 로그)
  apmLogLevel: "INFO"

  # 로그 조회 시 tail 줄 수 (기본 1000, 0이면 전체 — 대용량 시 브라우저 다운 주의)
  logTailLines: 1000

  # Bitbucket 클론 설정
  bitbucketUrl: ""                # Bitbucket 서버 URL (예: https://bitbucket.company.com)
  bitbucketToken: ""              # Bitbucket Bearer 토큰 (Personal Access Token)
  listRepoLimit: 25               # 레포 목록 조회 시 페이지당 건수
  cloneLocalPath: ""              # 클론받을 로컬 디렉토리 경로 (예: /Users/dev/repos)
  gitBashPath: ""                 # git-bash.exe 경로 (Windows, 예: C:\Program Files\Git\git-bash.exe)

  # 와탭 조회 파라미터 (ptotal: 전체 건수 상한, psize: 한 페이지 건수)
  whatapPtotal: 100
  whatapPsize: 10000

  # 와탭 공통 프로필 (URL/쿠키 공유, 레포에서 profileName으로 참조)
  whatapProfiles:
    - name: "운영"
      url: ""
      cookie: ""
    - name: "개발"
      url: ""
      cookie: ""

  # 제니퍼 공통 프로필 (URL/Bearer토큰 공유, 레포에서 profileName으로 참조)
  jenniferProfiles:
    - name: "운영"
      url: ""
      bearerToken: ""
    - name: "개발"
      url: ""
      bearerToken: ""

# 레포지토리별 설정
repositories:
  - repoName: spring-petclinic
    domain: https://api.petclinic.com
    rootPath: /Users/baegmyeongseon/Downloads/개발_코드/spring-petclinic
    gitBranch: ""                 # 빈값=현재 브랜치 유지, 값 있으면 checkout 후 pull (예: PRD, CBO)
    gitPullEnabled: "N"
    analysisBatchEnabled: "Y"   # 분석 배치 수행 여부 (Y/N)
    apmBatchEnabled: "Y"        # APM 수집 배치 수행 여부 (Y/N)
    teamName: IT카드개발팀
    managerName: 백명선            # ← 팀 대표 담당자 (매핑에 없으면 이 사람)
    businessName: 펫클리닉
    apiPathPrefix: ""
    pathConstants: ""
    # 프로그램ID별 담당자 매핑 (API 경로에 programId 포함 시 해당 담당자 배정)
